# Cantaia Desktop — Build & Release automatique
#
# Déclenché sur chaque tag vX.Y.Z poussé sur le repo.
# Produit : MSI + NSIS Windows + update.json pour l'auto-updater Tauri.
#
# Prérequis GitHub Secrets :
#   TAURI_SIGNING_PRIVATE_KEY        — clé privée de signature (base64)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — mot de passe de la clé
#
# Pour générer la clé de signature (une seule fois) :
#   pnpm tauri signer generate -w ~/.tauri/cantaia.key

name: Desktop Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  # Déclenchement manuel depuis l'UI GitHub (Actions → Desktop Release → Run workflow)
  # Utile pour tester sans pousser un tag de release
  workflow_dispatch:
    inputs:
      draft:
        description: "Créer comme Release draft (pas publiée)"
        type: boolean
        default: true

jobs:
  build-windows:
    name: Build Windows (MSI + NSIS)
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write   # requis pour créer/modifier un GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rust stable toolchain
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      # pnpm + Node
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # La version est lue depuis "packageManager" dans le root package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Génération des icônes Tauri depuis un carré orange 1024×1024 (brand color #F97316)
      # PowerShell + System.Drawing.Common sont toujours disponibles sur windows-latest
      - name: Generate Tauri icons
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $size = 1024
          $bmp = [System.Drawing.Bitmap]::new($size, $size)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          # Fond orange brand Cantaia (#F97316)
          $g.Clear([System.Drawing.Color]::FromArgb(255, 249, 115, 22))
          # Lettre "C" blanche centrée
          $font = [System.Drawing.Font]::new("Arial", 560, [System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.SolidBrush]::new([System.Drawing.Color]::White)
          $fmt = [System.Drawing.StringFormat]::new()
          $fmt.Alignment = [System.Drawing.StringAlignment]::Center
          $fmt.LineAlignment = [System.Drawing.StringAlignment]::Center
          $g.DrawString("C", $font, $brush, [System.Drawing.RectangleF]::new(0, 0, $size, $size), $fmt)
          $g.Dispose()
          $bmp.Save("apps\desktop\icon-source.png")
          $bmp.Dispose()
          # Générer toutes les variantes d'icônes (32x32, 128x128, icon.ico, icon.icns…)
          cd apps/desktop && pnpm exec tauri icon icon-source.png

      # Build Tauri + créer le GitHub Release automatiquement
      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || format('dev-{0}', github.sha) }}
          releaseName: ${{ github.event_name == 'push' && format('Cantaia {0}', github.ref_name) || format('Cantaia dev build ({0})', github.sha) }}
          releaseBody: |
            ## Cantaia Desktop ${{ github.ref_name }}

            ### Installation
            Téléchargez le fichier `.msi` (installeur Windows) ou `.exe` (NSIS) ci-dessous.

            ### Mise à jour automatique
            Si vous avez déjà Cantaia installé, la mise à jour sera proposée automatiquement au prochain démarrage.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: false
          projectPath: apps/desktop
          includeUpdaterJson: true
          # pnpm-lock.yaml est à la racine du monorepo → tauri-action ne détecte pas pnpm
          # On force l'utilisation de pnpm pour éviter "Missing script: tauri"
          tauriScript: pnpm tauri
